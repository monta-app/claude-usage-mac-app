<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8875E"/>
      <stop offset="0.55" stop-color="#D97757"/>
      <stop offset="1" stop-color="#B85C3E"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#FBEEE6"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#5A2414" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded-rect app tile -->
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="832" rx="196" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="4"/>

  <!-- usage gauge: track + filled arc -->
  <g filter="url(#soft)" fill="none" stroke-linecap="round">
    <!-- track (~270° gauge) -->
    <path d="M 322 690 A 268 268 0 1 1 702 690"
          stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="78"/>
    <!-- filled portion (~68% usage) -->
    <path d="M 322 690 A 268 268 0 0 1 745 439"
          stroke="url(#arc)" stroke-width="78"/>
  </g>

  <!-- needle hub -->
  <circle cx="512" cy="512" r="46" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="20" fill="#D97757"/>
  <!-- needle -->
  <g transform="rotate(58 512 512)">
    <rect x="500" y="300" width="24" height="232" rx="12" fill="#FFFFFF"/>
  </g>
</svg>
