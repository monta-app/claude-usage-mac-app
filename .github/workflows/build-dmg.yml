name: Build DMG

on:
  push:
    branches: [main]
    # Skip doc-only churn so we don't cut a release for a README tweak.
    paths-ignore:
      - '**/*.md'
  workflow_dispatch: {}

permissions:
  contents: write   # needed to publish the release + upload the asset

concurrency:
  group: build-dmg
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install rsvg-convert (icon rendering)
        run: brew install librsvg

      - name: Build DMG
        run: ./make-dmg.sh

      - name: Build ccu CLI
        run: |
          SHA="${GITHUB_SHA:0:7}"
          cat > Sources/ccu/Version.swift <<SWIFT
          import Foundation
          public enum CCUVersion {
              public static let sha: String = "$SHA"
              public static let repo = "monta-app/claude-usage-mac-app"
              public static let assetName = "ccu.tar.gz"
          }
          SWIFT
          swift build -c release --product ccu
          # Zip the binary to dodge GitHub's content-type sniffing (a bare
          # "ccu" file downloads as text in some browsers).
          cd .build/release && tar czf ../../ccu.tar.gz ccu && cd ../..

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES="Automated build from \`main\` @ ${GITHUB_SHA:0:7}.

          **Install the app:** open the DMG and drag **Claude Usage** to Applications.

          The app is ad-hoc signed (no Apple Developer cert), so on first launch
          macOS Gatekeeper will block it. Right-click the app → **Open** → **Open**,
          or run \`xattr -cr \"/Applications/Claude Usage.app\"\` once.

          **Install the CLI (ccu):**
          \`\`\`bash
          curl -fsSL https://github.com/monta-app/claude-usage-mac-app/releases/latest/download/ccu.tar.gz | tar xz -C ~/.local/bin
          chmod +x ~/.local/bin/ccu
          \`\`\`
          Then run \`ccu --version\` and \`ccu login <name>\`."

          # Recreate the 'latest' release so the assets are always the newest build.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest "Claude-Usage.dmg" "ccu.tar.gz" \
            --title "Latest build" \
            --notes "$NOTES" \
            --latest
