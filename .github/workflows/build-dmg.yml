name: Release

on:
  push:
    branches: [main]
    # Skip doc-only churn so we don't cut a release for a README tweak.
    paths-ignore:
      - '**/*.md'
  workflow_dispatch: {}

permissions:
  contents: write   # needed to publish the release + upload the asset

concurrency:
  group: build-dmg
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install rsvg-convert (icon rendering)
        run: brew install librsvg

      - name: Build DMG
        run: ./make-dmg.sh

      - name: Compute version (1.<N>, N = previous + 1)
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Find the highest existing v1.<N> tag and bump by 1. If none exist
          # (fresh start), begin at 1. Old date-based tags from the previous
          # scheme are ignored — they stay as historical artifacts.
          PRIOR=$(gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | grep -E '^v1\.[0-9]+$' \
            | sed 's/v1\.//' \
            | sort -n \
            | tail -1 || true)
          N=$((PRIOR + 1))
          VERSION="1.${N}"
          echo "Computed VERSION=$VERSION (prior N=${PRIOR:-none})"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build ccu CLI
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA="${GITHUB_SHA:0:7}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

          cat > Sources/ccu/Version.swift <<SWIFT
          import Foundation
          public enum CCUVersion {
              public static let sha: String = "$SHA"
              public static let version: String = "$VERSION"
              public static let repo = "monta-app/claude-usage-mac-app"
              public static let assetName = "ccu.tar.gz"
          }
          SWIFT
          cat > Sources/AnthropicUsageBar/Version.swift <<SWIFT
          import Foundation
          enum AppVersion {
              static let sha: String = "$SHA"
              static let version: String = "$VERSION"
              static let repo = "monta-app/claude-usage-mac-app"
          }
          SWIFT
          swift build -c release --product ccu
          # Tar the binary from the repo root so the archive contains a bare
          # `ccu` entry. -C changes dir for tar only — no cd dance to undo.
          tar czf ccu.tar.gz -C .build/release ccu
          echo "=== verifying ccu.tar.gz ==="
          ls -la ccu.tar.gz
          tar tzf ccu.tar.gz

      - name: Publish rolling "latest" release + tagged version release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -la Claude-Usage.dmg ccu.tar.gz

          NOTES="Build \`$VERSION\` from \`main\` @ ${SHA}.

          **Install the app:** open the DMG and drag **Claude Usage** to Applications.

          The app is ad-hoc signed (no Apple Developer cert), so on first launch
          macOS Gatekeeper will block it. Right-click the app → **Open** → **Open**,
          or run \`xattr -cr \"/Applications/Claude Usage.app\"\` once.

          **Install the CLI (ccu):**
          \`\`\`bash
          curl -fsSL https://github.com/monta-app/claude-usage-mac-app/releases/latest/download/ccu.tar.gz | tar xz -C ~/.local/bin
          chmod +x ~/.local/bin/ccu
          \`\`\`
          Then run \`ccu --version\` and \`ccu login <name>\`."

          # 1) Update the rolling "latest" release (rebuilt every push so the
          #    /releases/latest/download/ URLs always point at the newest build).
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest Claude-Usage.dmg ccu.tar.gz \
            --title "Latest build (v$VERSION)" \
            --notes "$NOTES" \
            --latest

          # 2) Also publish a tagged release so old builds are kept forever
          #    and downloadable by version. Use the version as the tag so
          #    `ccu update` can point at a specific one if needed.
          gh release create "v$VERSION" Claude-Usage.dmg ccu.tar.gz \
            --title "Build v$VERSION" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA"
